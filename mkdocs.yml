site_name: Downleaf
site_description: Mount Overleaf projects as a local filesystem
site_url: https://FanBB2333.github.io/downleaf/
repo_url: https://github.com/FanBB2333/downleaf
repo_name: FanBB2333/downleaf

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: blue grey
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue grey
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.tabs
    - search.highlight
    - search.suggest
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - admonition
  - tables
  - footnotes
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md
  - CLI Reference: cli-reference.md
  - Troubleshooting: troubleshooting.md
